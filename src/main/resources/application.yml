spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/easyecommerce
    username: postgres
    password: '44815602'

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  output:
    ansi:
      enabled: always

  application:
    name: easyecommerce

server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

# Configuración de seguridad JWT
# La secret-key se genera de forma aleatoria y segura en cada inicio de la aplicación
security:
  jwt:
    expiration-minutes: 30
    # secret-key se genera automáticamente de forma segura al iniciar la aplicación (ver JwtConfig.java)
