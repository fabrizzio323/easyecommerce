spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/easyecommerce
    username: postgres
    password: '44815602' # Es mejor ponerlo entre comillas por si hay caracteres especiales

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    # --- ESTA LÍNEA ES LA QUE FALTA ---
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  # Si usas Spring Boot 3, esto ayuda a ver errores detallados de la inicialización
  output:
    ansi:
      enabled: always

server:
  port: 8081

